<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City · Oro AP Appraisal Calibration</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="city-page">
  <header class="app-header">
    <a href="index.html" class="back-link">&larr; All cities</a>
    <p class="eyebrow">Oro · Lending Services Audit</p>
    <h1 id="city-title">City</h1>
  </header>

  <main>
    <a id="new-calibration-link" href="#" class="btn btn-primary" style="margin-bottom: 24px;">
      + New calibration
    </a>

    <p class="section-label">Calibration history</p>

    <div class="history-layout">
      <aside class="history-stats">
        <div class="stats-card">
          <div class="stat-row">
            <span class="stat-label">Total</span>
            <span class="stat-value" id="stat-total">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Pass</span>
            <span class="stat-value pass" id="stat-pass">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Fail</span>
            <span class="stat-value fail" id="stat-fail">—</span>
          </div>
        </div>
        <div class="filter-group" role="group" aria-label="Filter by result">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="Pass">Pass</button>
          <button type="button" class="filter-btn" data-filter="Fail">Fail</button>
        </div>

        <div class="field" style="margin: 14px 0 10px;">
          <label for="date-range-select">Date range</label>
          <select id="date-range-select"></select>
        </div>

        <button type="button" id="export-btn" class="btn btn-secondary">⬇ Export to Excel</button>
      </aside>

      <div id="history-list">
        <div class="empty-state">Loading…</div>
      </div>
    </div>
  </main>

  <script type="module" src="js/city.js"></script>
</body>
</html>
