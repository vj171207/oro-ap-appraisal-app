<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Interview · AP Interview</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div id="user-bar" class="user-bar"></div>
    <a href="interview.html" class="back-link">&larr; Back</a>
    <p class="eyebrow" id="city-eyebrow">City</p>
    <h1>New Interview Entry</h1>
  </header>

  <main>
    <!-- ===== FORM VIEW ===== -->
    <form id="interview-form">
      <div class="card">
        <h2>Candidate details</h2>
        <div class="field">
          <label for="interviewDate">Date</label>
          <input type="date" id="interviewDate" required />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="candidateName">Candidate Name</label>
            <input type="text" id="candidateName" required />
          </div>
          <div class="field">
            <label for="locationDetail">Location (optional detail)</label>
            <input type="text" id="locationDetail" placeholder="e.g. PCMC, Mandya" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="company">Company / Previous Employer(s)</label>
            <input type="text" id="company" />
          </div>
          <div class="field">
            <label for="role">Role</label>
            <input type="text" id="role" placeholder="e.g. AP, ATM, APT" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="age">Age</label>
            <input type="number" id="age" min="0" max="100" />
          </div>
          <div class="field">
            <label for="experience">Total Relevant Experience</label>
            <input type="text" id="experience" placeholder="e.g. 2.5 Years" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="bikeAvailable">Bike Available</label>
            <select id="bikeAvailable">
              <option value="" disabled selected>Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="field">
            <label for="dlAvailable">DL Available</label>
            <select id="dlAvailable">
              <option value="" disabled selected>Select…</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Appraisal scores</h2>
        <div class="field-row">
          <div class="field">
            <label for="scoreTheory">Theory Score (out of 4)</label>
            <input type="number" id="scoreTheory" min="0" max="4" step="1" />
          </div>
          <div class="field">
            <label for="scorePractical">Practical Score (out of 6)</label>
            <input type="number" id="scorePractical" min="0" max="6" step="1" />
          </div>
        </div>
        <div class="field">
          <label for="totalScore">Total Score</label>
          <input type="number" id="totalScore" min="0" max="10" step="1" />
        </div>
      </div>

      <div class="card">
        <h2>Language &amp; decision</h2>
        <div class="field-row">
          <div class="field">
            <label id="localLanguageLabel" for="localLanguageProficiency">Local Language Proficiency</label>
            <select id="localLanguageProficiency">
              <option value="" disabled selected>Select…</option>
              <option value="Yes">Yes</option>
              <option value="Good">Good</option>
              <option value="Average">Average</option>
              <option value="Below Average">Below Average</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="field">
            <label for="englishProficiency">English Proficiency</label>
            <select id="englishProficiency">
              <option value="" disabled selected>Select…</option>
              <option value="Yes">Yes</option>
              <option value="Good">Good</option>
              <option value="Average">Average</option>
              <option value="Below Average">Below Average</option>
              <option value="No">No</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="round1Decision">Round 1 Decision (Selected/Rejected — if rejected, why?)</label>
          <input type="text" id="round1Decision" placeholder="e.g. Selected, or Rejected due to lack of appraisal knowledge" />
        </div>
        <div class="field">
          <label for="interviewer">Round 1 Interviewer (Appraisal)</label>
          <input type="text" id="interviewer" />
        </div>
        <div class="field">
          <label for="remarks">Detailed Remarks</label>
          <textarea id="remarks" rows="3" placeholder="Any additional observations…"></textarea>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Save interview entry</button>
    </form>

    <!-- ===== SAVED CONFIRMATION VIEW (hidden until submit) ===== -->
    <div id="result-view" style="display: none;">
      <div class="card">
        <h2>Saved</h2>
        <p style="font-size: 14px; color: var(--text-muted); line-height: 1.6;">
          The interview entry for <strong id="saved-name"></strong> has been saved.
        </p>
      </div>
      <a href="#" id="new-entry-again-link" class="btn btn-primary" style="margin-top: 12px;">Add another entry</a>
      <a href="interview.html" class="btn btn-secondary" style="margin-top: 10px;">Back to city selection</a>
    </div>
  </main>

  <script type="module" src="js/interview-entry.js"></script>
</body>
</html>
