<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings · Oro AP Appraisal Calibration</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div id="user-bar" class="user-bar"></div>
    <a href="index.html" class="back-link">&larr; All cities</a>
    <p class="eyebrow">Made for ORO.</p>
    <h1>Settings</h1>
  </header>

  <main>
    <div id="access-denied" class="card" style="display: none;">
      <h2>Access restricted</h2>
      <p style="font-size: 14px; color: var(--text-muted);">
        Settings is only available to Managers. If you believe this is a mistake, contact your admin.
      </p>
    </div>

    <div id="settings-content" style="display: none;">
      <div class="card">
        <h2>Add an auditor</h2>
        <div class="field-row">
          <div class="field" style="margin-bottom: 0;">
            <label for="new-auditor-name-input">Auditor name</label>
            <input type="text" id="new-auditor-name-input" placeholder="e.g. Arun Mathiyazhagan" />
          </div>
          <div class="field" style="margin-bottom: 0;">
            <label for="new-auditor-code-input">Employee code</label>
            <input type="text" id="new-auditor-code-input" placeholder="e.g. ORO00320" />
          </div>
        </div>
        <p id="add-auditor-error" style="font-size: 13px; color: var(--fail-bright); display: none; margin: 10px 0;"></p>
        <p id="add-auditor-success" style="font-size: 13px; color: var(--pass-bright); display: none; margin: 10px 0;"></p>
        <button type="button" id="add-auditor-btn" class="btn btn-primary" style="margin-top: 10px;">Add Auditor</button>
      </div>

      <button type="button" id="toggle-auditors-btn" class="toggle-list-btn">▸ Show current auditors</button>
      <div id="auditor-list-display" style="display: none; margin-top: 8px;"></div>

      <div class="card" style="margin-top: 28px;">
        <h2>Add a city</h2>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.6;">
          Spellings must exactly match.
        </p>
        <div class="field">
          <label for="new-city-input">City name</label>
          <input type="text" id="new-city-input" placeholder="e.g. Coimbatore" />
        </div>
        <p id="add-city-error" style="font-size: 13px; color: var(--fail-bright); display: none; margin-bottom: 10px;"></p>
        <p id="add-city-success" style="font-size: 13px; color: var(--pass-bright); display: none; margin-bottom: 10px;"></p>
        <button type="button" id="add-city-btn" class="btn btn-primary">Add City</button>
      </div>

      <button type="button" id="toggle-cities-btn" class="toggle-list-btn">▸ Show current cities</button>
      <div id="city-list-display" class="city-list" style="display: none; margin-top: 8px;"></div>
    </div>
  </main>

  <script type="module" src="js/settings.js"></script>
</body>
</html>
