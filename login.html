<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Oro AP Appraisal Calibration</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .login-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .login-card {
      max-width: 380px;
      width: 100%;
    }
    .login-card .eyebrow {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 28px;
    }
    .google-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #FFFFFF;
      color: #1F1F1F;
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 600;
      padding: 13px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid #D8DCE3;
      cursor: pointer;
    }
    .google-btn:hover { background: #F7F7F7; }
    .google-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-note {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }
    #login-error {
      margin-top: 16px;
      font-size: 13px;
      color: var(--fail-bright);
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <p class="eyebrow">Oro · Lending Services Audit</p>
      <h1>AP Appraisal Calibration</h1>

      <button type="button" id="google-signin-btn" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.62z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.81.54-1.84.86-3.05.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.33A9 9 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.97 10.71A5.41 5.41 0 0 1 3.68 9c0-.59.1-1.17.28-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.96l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
        </svg>
        Sign in with Google
      </button>

      <p class="login-note">Restricted to @orocorp.in accounts</p>
      <p id="login-error"></p>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
