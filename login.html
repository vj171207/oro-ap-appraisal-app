<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Oro AP Appraisal Calibration</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .login-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      max-width: 360px;
      width: 100%;
    }
    .login-card .eyebrow {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 6px;
      text-align: center;
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 28px;
      text-align: center;
    }
    #login-error {
      margin-top: 4px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--fail-bright);
      display: none;
    }
    #login-notice {
      margin-top: 4px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--pass-bright);
      display: none;
    }
    .forgot-link {
      display: block;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 14px;
      cursor: pointer;
    }
    .forgot-link:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <p class="eyebrow">Oro · Lending Services Audit</p>
      <h1>AP Appraisal Calibration</h1>

      <form id="login-form">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required autocomplete="username" placeholder="you@orocorp.in" />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required autocomplete="current-password" />
        </div>

        <p id="login-error"></p>
        <p id="login-notice"></p>

        <button type="submit" id="login-submit-btn" class="btn btn-primary">Sign In</button>
      </form>

      <span class="forgot-link" id="forgot-link">Forgot password?</span>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
