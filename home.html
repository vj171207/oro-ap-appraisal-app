<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oro — Auditor Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .hub-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text);
      margin: 0 0 10px;
    }
    .hub-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 24px;
    }
    .hub-card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 28px 24px;
      text-decoration: none;
      transition: background 0.15s ease;
    }
    .hub-card:hover, .hub-card:focus-visible {
      background: var(--surface-raised);
    }
    .hub-card .hub-card-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
    }
    .hub-card .hub-card-arrow {
      color: var(--accent);
      font-size: 18px;
      float: right;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div id="user-bar" class="user-bar"></div>
    <p class="eyebrow">Made for ORO.</p>
    <h1>Auditor Dashboard</h1>
  </header>

  <main>
    <p class="hub-label">Choose a workspace</p>
    <div class="hub-grid">
      <a href="index.html" class="hub-card">
        <span class="hub-card-arrow">&rarr;</span>
        <div class="hub-card-title">AP Appraisal Calibration</div>
      </a>
      <a href="interview.html" class="hub-card">
        <span class="hub-card-arrow">&rarr;</span>
        <div class="hub-card-title">AP Interview</div>
      </a>
    </div>
  </main>

  <script type="module" src="js/home.js"></script>
</body>
</html>
