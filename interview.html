<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP Interview · Oro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="index-page">
  <header class="app-header">
    <div id="user-bar" class="user-bar"></div>
    <a href="home.html" class="back-link">&larr; Home</a>
    <p class="eyebrow">Made for ORO.</p>
    <h1>AP Interview</h1>
  </header>

  <main>
    <div class="history-layout">
      <aside class="history-stats">
        <div class="stats-card">
          <div class="stat-row">
            <span class="stat-label">Total</span>
            <span class="stat-value" id="stat-total">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Selected</span>
            <span class="stat-value pass" id="stat-selected">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Rejected</span>
            <span class="stat-value fail" id="stat-rejected">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Selection Rate</span>
            <span class="stat-value" id="stat-rate">—</span>
          </div>
        </div>

        <div class="filter-row">
          <div class="field" style="margin-bottom: 0;">
            <label for="quick-range-select">Quick range</label>
            <select id="quick-range-select"></select>
          </div>
        </div>

        <div class="filter-row mt-8">
          <div class="field" style="margin-bottom: 0;">
            <label for="from-date-input">From</label>
            <input type="date" id="from-date-input" />
          </div>
          <div class="field" style="margin-bottom: 0;">
            <label for="to-date-input">To</label>
            <input type="date" id="to-date-input" />
          </div>
        </div>

        <button type="button" id="apply-filters-btn" class="btn btn-primary mt-12">Apply</button>
      </aside>

      <div>
        <p class="section-label">Select a city to continue</p>
        <div class="city-list" id="city-list"></div>

        <a href="interview-reports.html" class="btn btn-secondary mt-20">
          ⬇ All-Cities Report
        </a>
      </div>
    </div>
  </main>

  <footer class="app-footer">AP Interview tracking</footer>

  <script type="module" src="js/interview.js"></script>
</body>
</html>
