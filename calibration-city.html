<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City · Oro AP Appraisal Calibration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="city-page">
  <header class="app-header">
    <div id="user-bar" class="user-bar"></div>
    <a href="calibration-home.html" class="back-link">&larr; All cities</a>
    <p class="eyebrow">Made for ORO.</p>
    <h1 id="city-title">City</h1>
  </header>

  <main>
    <a id="new-calibration-link" href="#" class="btn btn-primary" style="margin-bottom: 24px;">
      + New calibration
    </a>

    <p class="section-label">Calibration history</p>

    <div class="history-layout">
      <aside class="history-stats">
        <div class="stats-card">
          <div class="stat-row">
            <span class="stat-label">Total</span>
            <span class="stat-value" id="stat-total">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Pass</span>
            <span class="stat-value pass" id="stat-pass">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Fail</span>
            <span class="stat-value fail" id="stat-fail">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Clearance</span>
            <span class="stat-value" id="stat-clearance">—</span>
          </div>
        </div>
        <div class="filter-row">
          <div class="field" style="margin-bottom: 0;">
            <label for="result-filter-select">Result</label>
            <select id="result-filter-select">
              <option value="all">All</option>
              <option value="Pass">Pass</option>
              <option value="Fail">Fail</option>
            </select>
          </div>
          <div class="field" style="margin-bottom: 0;">
            <label for="quick-range-select">Quick range</label>
            <select id="quick-range-select"></select>
          </div>
        </div>

        <div class="filter-row mt-8">
          <div class="field" style="margin-bottom: 0;">
            <label for="from-date-input">From</label>
            <input type="date" id="from-date-input" />
          </div>
          <div class="field" style="margin-bottom: 0;">
            <label for="to-date-input">To</label>
            <input type="date" id="to-date-input" />
          </div>
        </div>

        <button type="button" id="apply-filters-btn" class="btn btn-primary mt-12">Apply</button>

        <button type="button" id="export-btn" class="btn btn-secondary mt-10">⬇ Export to Excel</button>
      </aside>

      <div id="history-list">
        <div class="empty-state">Loading…</div>
      </div>
    </div>
  </main>

  <script type="module" src="js/calibration-city.js"></script>
</body>
</html>
