<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Auditor Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .login-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      max-width: 360px;
      width: 100%;
    }
    .login-card .eyebrow {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 6px;
      text-align: center;
    }
    .login-card h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 28px;
      text-align: center;
    }
    #login-error {
      margin-top: 4px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--fail-bright);
      display: none;
    }

    /* Browsers force their own autofill styling (typically a white/light
       background with dark text) that overrides normal input CSS. This
       forces autofilled fields to keep looking like every other input —
       box-shadow is the standard trick since background-color alone gets
       overridden by the browser's autofill styling precedence. */
    .field input:-webkit-autofill,
    .field input:-webkit-autofill:hover,
    .field input:-webkit-autofill:focus {
      -webkit-text-fill-color: #E8E6E1;
      -webkit-box-shadow: 0 0 0 1000px #12141A inset;
      box-shadow: 0 0 0 1000px #12141A inset;
      caret-color: #E8E6E1;
      transition: background-color 5000s ease-in-out 0s; /* prevents a flash of the browser's own color before the override applies */
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <p class="eyebrow">Made for ORO.</p>
      <h1>Auditor Dashboard</h1>

      <form id="login-form">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required autocomplete="username" placeholder="you@orocorp.in" />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required autocomplete="current-password" />
        </div>

        <p id="login-error"></p>

        <button type="submit" id="login-submit-btn" class="btn btn-primary">Sign In</button>
      </form>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
